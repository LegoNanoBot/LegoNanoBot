<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NanoBot X-Ray{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        // Configure Tailwind dark mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .long-text-wrap {
            position: relative;
        }

        .long-text-box {
            max-height: 14rem;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .long-text-box.expanded {
            max-height: 40rem;
        }

        .long-text-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .long-text-btn {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 0.375rem;
            border: 1px solid #4b5563;
            background: #1f2937;
            color: #d1d5db;
            cursor: pointer;
        }

        .long-text-btn:hover {
            background: #374151;
        }
    </style>
</head>
<body class="h-full bg-gray-900 text-gray-100">
    <!-- Left sidebar navigation -->
    <aside class="fixed inset-y-0 left-0 w-56 bg-gray-800 border-r border-gray-700 flex flex-col">
        <!-- Logo -->
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-lg font-bold text-emerald-400 flex items-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM4.332 8.027a6.012 6.012 0 011.912-2.706C6.512 5.73 6.974 6 7.5 6A1.5 1.5 0 019 7.5V8a2 2 0 004 0 2 2 0 011.523-1.943A5.977 5.977 0 0116 10c0 .34-.028.675-.083 1H15a2 2 0 00-2 2v2.197A5.973 5.973 0 0110 16v-2a2 2 0 00-2-2 2 2 0 01-2-2 2 2 0 00-1.668-1.973z" clip-rule="evenodd"></path>
                </svg>
                NanoBot X-Ray
            </h1>
        </div>
        
        <!-- Navigation links -->
        <nav class="flex-1 p-3 space-y-1">
            <a href="/dashboard" 
               class="nav-link flex items-center gap-3 px-3 py-2 rounded-md text-sm transition-colors
                      {% if page == 'dashboard' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                </svg>
                Dashboard
            </a>
            <a href="/agents" 
               class="nav-link flex items-center gap-3 px-3 py-2 rounded-md text-sm transition-colors
                      {% if page == 'agents' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                Agents
            </a>
            <a href="/config" 
               class="nav-link flex items-center gap-3 px-3 py-2 rounded-md text-sm transition-colors
                      {% if page == 'config' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                Config
            </a>
            <a href="/tokens" 
               class="nav-link flex items-center gap-3 px-3 py-2 rounded-md text-sm transition-colors
                      {% if page == 'tokens' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Tokens
            </a>
        </nav>
        
        <!-- Status indicator at bottom -->
        <div class="p-4 border-t border-gray-700">
            <div class="flex items-center gap-2 text-xs text-gray-400"
                 hx-get="/api/v1/status" hx-trigger="every 5s" hx-swap="innerHTML" hx-target="#status-content">
                <div id="status-content" class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span>Connected</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main content area -->
    <main class="ml-56 min-h-full">
        <!-- Top status bar -->
        <header class="sticky top-0 z-10 bg-gray-800/95 backdrop-blur border-b border-gray-700 px-6 py-3">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-semibold">{% block header %}{% endblock %}</h2>
                <div class="flex items-center gap-4 text-sm">
                    <div id="active-count" class="flex items-center gap-2"
                         hx-get="/api/v1/agents/active" hx-trigger="every 3s" hx-swap="innerHTML" hx-target="#active-indicator">
                        <span id="active-indicator" class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
                            <span class="text-gray-300">0 active agents</span>
                        </span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-400" id="sse-indicator"></span>
                        <span class="text-gray-300">SSE</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page content -->
        <div class="p-6">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Global SSE connection for live updates -->
    <script>
        // SSE connection status indicator
        document.addEventListener('htmx:sseOpen', function(evt) {
            document.getElementById('sse-indicator').classList.remove('bg-red-400');
            document.getElementById('sse-indicator').classList.add('bg-blue-400');
        });
        document.addEventListener('htmx:sseError', function(evt) {
            document.getElementById('sse-indicator').classList.remove('bg-blue-400');
            document.getElementById('sse-indicator').classList.add('bg-red-400');
        });
        
        // Format timestamps to human readable
        function formatTimestamp(ts) {
            if (!ts) return '-';
            const date = new Date(ts * 1000);
            return date.toLocaleString();
        }
        
        // Format numbers with commas
        function formatNumber(num) {
            if (num === null || num === undefined) return '0';
            return num.toLocaleString();
        }

        function toggleLongText(id, btn) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.toggle('expanded');
            btn.textContent = el.classList.contains('expanded') ? '收起' : '展开';
        }

        async function copyLongText(id, btn) {
            const el = document.getElementById(id);
            if (!el) return;
            const text = el.textContent || '';
            try {
                await navigator.clipboard.writeText(text);
                const old = btn.textContent;
                btn.textContent = '已复制';
                setTimeout(() => {
                    btn.textContent = old;
                }, 1000);
            } catch (e) {
                console.warn('copy failed', e);
            }
        }
    </script>
</body>
</html>
